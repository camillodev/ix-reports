// DOM Elements
const reportsContainer = document.getElementById('reports-container');
const searchInput = document.getElementById('search-input');
const noResultsModal = document.getElementById('no-results-modal');
const contentTitle = document.getElementById('content-title');
const themeToggle = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-icon');
const filterButtons = document.querySelectorAll('.nav-item-filter');
const viewBtns = document.querySelectorAll('.view-btn');

// State
let currentFilters = {
  client: 'all',
  category: null,
  tag: null,
  search: ''
};
let currentView = 'grid';

// Initialize
function init() {
  renderReports();
  setupEventListeners();
  initTheme();
  updateCounts();
}

// Theme Management
function initTheme() {
  const savedTheme = localStorage.getItem('ix-theme') || 'light';
  setTheme(savedTheme);
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-bs-theme', theme);
  localStorage.setItem('ix-theme', theme);
  updateThemeIcon(theme);
}

function updateThemeIcon(theme) {
  if (theme === 'dark') {
    themeIcon.classList.remove('bi-moon-fill');
    themeIcon.classList.add('bi-sun-fill');
  } else {
    themeIcon.classList.remove('bi-sun-fill');
    themeIcon.classList.add('bi-moon-fill');
  }
}

themeToggle.addEventListener('click', () => {
  const currentTheme = document.documentElement.getAttribute('data-bs-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  setTheme(newTheme);
});

// Event Listeners
function setupEventListeners() {
  // Filter buttons
  filterButtons.forEach(btn => {
    btn.addEventListener('click', handleFilter);
  });

  // Search
  searchInput.addEventListener('input', handleSearch);

  // View toggle
  viewBtns.forEach(btn => {
    btn.addEventListener('click', handleViewChange);
  });
}

function handleFilter(e) {
  const btn = e.currentTarget;
  
  // Remove active class from all buttons in the same group
  const sectionButtons = btn.parentElement.querySelectorAll('.nav-item-filter');
  sectionButtons.forEach(b => b.classList.remove('active'));
  
  // Add active to clicked button
  btn.classList.add('active');

  // Update filter
  if (btn.hasAttribute('data-client')) {
    currentFilters.client = btn.dataset.client;
    currentFilters.category = null;
    currentFilters.tag = null;
  } else if (btn.hasAttribute('data-category')) {
    currentFilters.category = btn.dataset.category;
    currentFilters.client = 'all';
    currentFilters.tag = null;
  } else if (btn.hasAttribute('data-tag')) {
    currentFilters.tag = btn.dataset.tag;
    currentFilters.client = 'all';
    currentFilters.category = null;
  }

  renderReports();
  updateTitle();
}

function handleSearch(e) {
  currentFilters.search = e.target.value.toLowerCase();
  renderReports();
}

function handleViewChange(e) {
  const btn = e.currentTarget;
  viewBtns.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentView = btn.dataset.view;
  reportsContainer.className = `reports-${currentView}`;
  renderReports();
}

// Render Reports
function renderReports() {
  const filtered = filterReports();
  reportsContainer.innerHTML = '';

  if (filtered.length === 0) {
    noResultsModal.style.display = 'flex';
    reportsContainer.style.minHeight = '400px';
    return;
  }

  noResultsModal.style.display = 'none';
  reportsContainer.innerHTML = filtered.map(report => `
    <div class="report-card" data-client="${report.client}" data-category="${report.category}">
      <div class="report-image">
        <img src="${report.thumbnail}" alt="${report.title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22120%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22120%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2214%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3ENo Image%3C/text%3E%3C/svg%3E'">
        ${report.priority === 'high' ? '<span class="priority-badge">Priority</span>' : ''}
      </div>
      <div class="report-content">
        <h3>${report.title}</h3>
        <p>${report.description}</p>
        <div class="report-meta">
          <span class="client-badge">${getClientLabel(report.client)}</span>
          <span class="category-badge">${getCategoryLabel(report.category)}</span>
        </div>
        <div class="report-tags">
          ${report.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
        </div>
        <div class="report-footer">
          <small>Atualizado em ${formatDate(report.lastUpdated)}</small>
          <a href="${report.link}" class="btn-view" target="_blank">Abrir →</a>
        </div>
      </div>
    </div>
  `).join('');
}

function filterReports() {
  return reports.filter(report => {
    // Client filter
    if (currentFilters.client !== 'all' && report.client !== currentFilters.client) {
      return false;
    }

    // Category filter
    if (currentFilters.category && report.category !== currentFilters.category) {
      return false;
    }

    // Tag filter
    if (currentFilters.tag && !report.tags.includes(currentFilters.tag)) {
      return false;
    }

    // Search filter
    if (currentFilters.search) {
      const search = currentFilters.search;
      return (
        report.title.toLowerCase().includes(search) ||
        report.description.toLowerCase().includes(search) ||
        report.tags.some(tag => tag.toLowerCase().includes(search))
      );
    }

    return true;
  });
}

function updateTitle() {
  if (currentFilters.client !== 'all') {
    contentTitle.textContent = getClientLabel(currentFilters.client);
  } else if (currentFilters.category) {
    contentTitle.textContent = getCategoryLabel(currentFilters.category);
  } else if (currentFilters.tag) {
    contentTitle.textContent = `Tag: ${currentFilters.tag}`;
  } else {
    contentTitle.textContent = 'Todos os Relatórios';
  }
}

function updateCounts() {
  // Update client counts
  document.getElementById('count-all').textContent = reports.length;
  document.getElementById('count-automation').textContent = reports.filter(r => r.category === 'automation').length;
  document.getElementById('count-integration').textContent = reports.filter(r => r.category === 'integration').length;
  document.getElementById('count-admin').textContent = reports.filter(r => r.category === 'admin').length;
  document.getElementById('count-performance').textContent = reports.filter(r => r.category === 'performance').length;
}

// Utility Functions
function getClientLabel(client) {
  const labels = {
    'all': 'Todos',
    'impact-x': 'Impact X',
    'kumon': 'Kumon',
    'pipefy': 'Pipefy',
    'infraestrutura': 'Infraestrutura',
    'rh': 'RH',
    'financeiro': 'Financeiro'
  };
  return labels[client] || client;
}

function getCategoryLabel(category) {
  const labels = {
    'automation': 'Automação',
    'integration': 'Integração',
    'admin': 'Admin',
    'performance': 'Performance'
  };
  return labels[category] || category;
}

function formatDate(dateString) {
  const date = new Date(dateString);
  return date.toLocaleDateString('pt-BR');
}

// Start the app
init();
