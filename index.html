<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatorio X — Reports Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="assets/css/tokens.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: ['selector', '[data-theme="dark"]'],
  theme: {
    extend: {
      colors: {
        ix: {
          green: 'var(--ix-green)',
          'green-dark': 'var(--ix-green-dark)',
          'green-light': 'var(--ix-green-light)',
          'green-tint': 'var(--ix-green-tint)',
          ink: 'var(--ix-ink)',
          muted: 'var(--ix-muted)',
          bg: 'var(--ix-bg)',
          surface: 'var(--ix-surface)',
          'surface-2': 'var(--ix-surface-2)',
          'surface-3': 'var(--ix-surface-3)',
          border: 'var(--ix-border)',
        }
      },
      fontFamily: {
        jakarta: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
        mono: ['Roboto Mono', 'ui-monospace', 'monospace'],
      },
      boxShadow: {
        'ix-sm': 'var(--ix-shadow-sm)',
        'ix-card': 'var(--ix-shadow-card)',
        'ix-md': 'var(--ix-shadow-md)',
      },
      borderRadius: {
        'ix-sm': 'var(--ix-radius-sm)',
        'ix-md': 'var(--ix-radius-md)',
        'ix-lg': 'var(--ix-radius-lg)',
      }
    }
  }
}
</script>
<link href="assets/css/hub.css" rel="stylesheet">
<link href="assets/css/cmd-k.css" rel="stylesheet">
</head>
<body class="font-jakarta bg-ix-bg text-ix-ink min-h-screen antialiased">

<!-- Topbar -->
<header class="sticky top-0 z-[100] flex items-center justify-between h-14 px-6 bg-ix-surface border-b border-ix-border shadow-ix-sm max-md:px-4">
  <div class="flex items-center gap-3.5">
    <button class="icon-btn hamburger hidden max-md:inline-flex" id="hamburger" aria-label="Menu">
      <i class="bi bi-list"></i>
    </button>
    <a href="#" class="text-xl font-extrabold tracking-tight text-ix-ink no-underline">Relatorio <span class="text-ix-green">X</span></a>
  </div>
  <div class="flex items-center gap-2.5">
    <button class="cmdk-trigger max-md:hidden" id="cmdk-trigger" type="button">
      <i class="bi bi-search"></i>
      <span>Buscar...</span>
      <span class="shortcut">&#8984;K</span>
    </button>
    <div id="auth-badge" class="hidden items-center gap-1.5 px-2.5 py-1 rounded-ix-sm text-xs font-semibold"></div>
    <button class="icon-btn" id="theme-toggle" title="Alternar tema">
      <i class="bi bi-moon-fill" id="theme-icon"></i>
    </button>
  </div>
</header>

<!-- Sidebar overlay (mobile) -->
<div class="fixed inset-0 bg-black/40 z-[90] hidden" id="sidebar-overlay"></div>

<!-- Layout -->
<div class="flex min-h-[calc(100vh-56px)]">

  <!-- Sidebar -->
  <nav class="w-[280px] shrink-0 bg-ix-surface border-r border-ix-border py-4 overflow-y-auto max-h-[calc(100vh-56px)] sticky top-14 max-md:fixed max-md:top-0 max-md:left-0 max-md:bottom-0 max-md:z-[95] max-md:-translate-x-full max-md:transition-transform max-md:duration-200 max-md:max-h-screen max-md:pt-[72px]" id="sidebar">

    <div class="px-4 mb-2">
      <div class="text-xs font-bold tracking-wider text-ix-muted px-3 pt-2 mb-2">Clientes</div>
      <button class="nav-item active" id="tree-all-btn" data-filter="all">
        <i class="bi bi-grid-3x3-gap nav-icon"></i>
        <span class="nav-label">Todos</span>
        <span class="nav-count" id="count-all">0</span>
      </button>
      <div id="sidebar-tree"></div>
    </div>

    <div class="px-4 mb-2">
      <div class="text-xs font-bold tracking-wider text-ix-muted px-3 pt-2 mb-2">Categorias</div>
      <div id="tag-filters"></div>
    </div>

    <div class="px-4 mb-2">
      <div class="text-xs font-bold tracking-wider text-ix-muted px-3 pt-2 mb-2">Acesso</div>
      <div id="access-filters"></div>
    </div>

    <div class="active-filters-bar hidden" id="active-filters">
      <small id="result-count"></small>
      <button class="clear-filters-btn" id="clear-filters">Limpar</button>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 overflow-auto px-12 py-10 min-w-0 max-md:px-4 max-md:py-5">
    <!-- Toolbar -->
    <div class="flex flex-wrap items-center justify-between gap-3 mb-8 max-md:flex-col max-md:items-start">
      <div class="flex items-baseline gap-3">
        <h1 class="text-2xl font-extrabold tracking-tight" id="main-title">Relatorios</h1>
        <span class="text-sm text-ix-muted"><span id="total-count">0</span> documentos</span>
      </div>
      <div class="flex items-center gap-2">
        <!-- Sort dropdown -->
        <select id="sort-select" class="text-sm bg-ix-surface-2 border border-ix-border rounded-ix-sm px-3 py-1.5 text-ix-ink font-medium cursor-pointer focus:outline-none focus:border-ix-green font-jakarta">
          <option value="date-desc">Data ↓</option>
          <option value="date-asc">Data ↑</option>
          <option value="title-asc">Título A-Z</option>
          <option value="title-desc">Título Z-A</option>
          <option value="client-asc">Cliente</option>
        </select>
        <!-- View toggle -->
        <div class="view-toggle">
          <button class="view-toggle-btn active" data-view="list" title="Lista"><i class="bi bi-list-ul"></i></button>
          <button class="view-toggle-btn" data-view="grid" title="Grid"><i class="bi bi-grid-3x3-gap"></i></button>
        </div>
      </div>
    </div>

    <!-- Report rows -->
    <div class="reports-list" id="reports-list"></div>

    <div class="empty-state hidden" id="empty-state">
      <div class="text-4xl mb-3 text-ix-muted"><i class="bi bi-search"></i></div>
      <p class="text-ix-muted">Nenhum relatorio encontrado para esse filtro.</p>
    </div>

    <!-- Pagination -->
    <div class="mt-6" id="pagination-wrap">
      <div class="text-center text-sm text-ix-muted mb-2" id="pagination-info"></div>
      <nav aria-label="Paginacao">
        <ul class="pagination" id="pagination"></ul>
      </nav>
    </div>
  </main>

</div>

<!-- Footer -->
<footer class="text-sm text-center py-5 border-t border-ix-border text-ix-muted">
  Relatorio <span class="text-ix-green font-bold">X</span> — Rafael Camillo · <span id="footer-count">0</span> reports
</footer>

<!-- Cmd+K Palette -->
<div class="cmdk-overlay" id="cmdk-overlay">
  <div class="cmdk-box">
    <div class="cmdk-input-wrap">
      <i class="bi bi-search search-icon"></i>
      <input type="text" class="cmdk-input" id="cmdk-input" placeholder="Buscar relatorios, projetos, acoes..." autocomplete="off">
    </div>
    <div class="cmdk-results" id="cmdk-results"></div>
    <div class="cmdk-footer">
      <span><kbd>↑↓</kbd> navegar</span>
      <span><kbd>↵</kbd> abrir</span>
      <span><kbd>esc</kbd> fechar</span>
    </div>
  </div>
</div>

<!-- Token Auth Modal -->
<div class="fixed inset-0 bg-black/50 z-[200] hidden items-center justify-center" id="auth-modal">
  <div class="bg-ix-surface rounded-ix-lg p-8 max-w-sm w-full mx-4 shadow-ix-md">
    <h2 class="text-lg font-bold mb-1">Entrar</h2>
    <p class="text-sm text-ix-muted mb-4">Selecione o nivel de acesso e digite a senha.</p>
    <select id="auth-level-select" class="w-full px-3 py-2 text-sm bg-ix-surface-2 border border-ix-border rounded-ix-sm focus:outline-none focus:border-ix-green font-jakarta mb-3">
      <option value="empresa">Empresa (Time)</option>
      <option value="owner">Admin (Acesso Total)</option>
    </select>
    <input type="password" id="auth-token-input" placeholder="Senha de acesso" class="w-full px-3 py-2 text-sm bg-ix-surface-2 border border-ix-border rounded-ix-sm focus:outline-none focus:border-ix-green">
    <p id="auth-error" class="text-xs text-red-500 mt-1 hidden"></p>
    <div class="flex gap-2 mt-4">
      <button id="auth-token-save" class="flex-1 px-4 py-2 bg-ix-green text-white font-semibold text-sm rounded-ix-sm hover:opacity-90 transition-opacity">Entrar</button>
      <button id="auth-modal-close" class="px-4 py-2 bg-ix-surface-2 text-ix-muted font-semibold text-sm rounded-ix-sm border border-ix-border hover:text-ix-ink transition-colors">Cancelar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="assets/js/auth.js"></script>
<script src="assets/js/hub.js"></script>
<script src="assets/js/cmd-k.js"></script>
</body>
</html>
