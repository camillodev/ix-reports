<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impact X — Cafeteria · Plano de Negócio v3</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../assets/css/report.css" rel="stylesheet">
<style>
  .city-cabo { --city: #0077B6; }
  .city-itacare { --city: #2D6A4F; }
  .city-bh { --city: #7B2FBE; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; margin: 2px; }
  .badge-green { background: var(--ix-green-bg); color: var(--ix-green-dark); }
  .badge-yellow { background: #FEF3E2; color: #D4820A; }
  .badge-red { background: #FDECEA; color: #C0392B; }
  .badge-blue { background: #E0F2FE; color: #0077B6; }
  .income-box { background: var(--ix-green-bg); border: 2px solid var(--ix-green); border-radius: var(--ix-radius-md); padding: 20px 24px; margin: 20px 0; }
  .income-box h3 { color: var(--ix-green-dark); margin: 0 0 12px; font-size: 16px; }
  .income-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #C3E6CB; font-size: 14px; }
  .income-row:last-child { border-bottom: none; padding-top: 10px; font-weight: 800; font-size: 16px; color: var(--ix-green-dark); }
  .winner { background: var(--ix-green-bg) !important; }
  .loser { background: #FDECEA !important; }
  .rank-badge { display: inline-block; width: 22px; height: 22px; border-radius: 50%; text-align: center; line-height: 22px; font-size: 11px; font-weight: 800; margin-right: 4px; }
  .rank-1 { background: #FFD700; color: #1A1D21; }
  .rank-2 { background: #C0C0C0; color: #1A1D21; }
  .rank-3 { background: #CD7F32; color: white; }
</style>
</head>
