<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impact X — MVP Kumon Automação</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ix-ink: #1A1D21; --ix-muted: #6B7280; --ix-green: #11C76F;
    --ix-green-hover: #0EB863; --ix-green-dark: #059669; --ix-green-bg: #D1FAE5;
    --ix-green-tint: #ECFDF5; --ix-bg: #F4F6F9; --ix-surface: #FFFFFF;
    --ix-border: #E8ECF1; --ix-warning: #D4820A; --ix-danger: #C0392B;
    --ix-radius-sm: 10px; --ix-radius-md: 16px; --ix-radius-lg: 22px;
    --ix-shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --ix-shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--ix-bg); color: var(--ix-ink); font-size: 17px; line-height: 1.7; }
  .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--ix-surface); border-bottom: 1px solid var(--ix-border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; box-shadow: var(--ix-shadow-sm); }
  .topbar .back-btn { background: none; border: none; font: inherit; cursor: pointer; color: var(--ix-green); font-weight: 600; font-size: 15px; }
  .topbar .brand { text-decoration: none; color: var(--ix-ink); font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
  .topbar .brand .x { color: var(--ix-green); }
  .topbar .topbar-title { font-size: 14px; color: var(--ix-muted); font-weight: 500; }
</style>
</head>
<body>
<div class="container">
<h1>Impact X — MVP Kumon Automação</h1>
<p>PRD document for Kumon Financial Automation MVP</p>
</div>
</body>
</html>
