<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impact X — Viagem Itacaré</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ix-ink:#1A1D21;--ix-muted:#6B7280;--ix-green:#11C76F;--ix-green-hover:#0EB863;--ix-green-dark:#059669;--ix-green-light:#34D399;--ix-green-bg:#D1FAE5;--ix-green-tint:#ECFDF5;--ix-bg:#F4F6F9;--ix-surface:#FFFFFF;--ix-border:#E8ECF1;--ix-yellow:#FBBF24;--ix-warning:#D4820A;--ix-danger:#C0392B;--ix-shadow-sm:0 1px 3px rgba(0,0,0,.06);--ix-shadow-md:0 4px 12px rgba(0,0,0,.08);--ix-radius-sm:10px;--ix-radius-md:16px;--ix-radius-lg:22px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:18px;line-height:1.6;color:var(--ix-ink);background:var(--ix-bg)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--ix-surface);border-bottom:1px solid var(--ix-border);box-shadow:var(--ix-shadow-sm)}
.topbar .back-btn{background:none;border:none;font-size:15px;color:var(--ix-muted);cursor:pointer;font-family:inherit}
.topbar .back-btn:hover{color:var(--ix-green)}
.topbar .brand{font-weight:800;font-size:18px;text-decoration:none;color:var(--ix-ink);letter-spacing:-0.5px}
.topbar .brand .x{color:var(--ix-green)}
.topbar .topbar-title{font-size:14px;color:var(--ix-muted);font-weight:500}
.tab-nav{position:fixed;top:56px;left:0;right:0;z-index:99;display:flex;gap:4px;padding:8px 24px;background:var(--ix-surface);border-bottom:1px solid var(--ix-border);overflow-x:auto;-webkit-overflow-scrolling:touch}
